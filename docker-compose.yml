services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: escrow
      POSTGRES_USER: escrow
      POSTGRES_PASSWORD: escrow
    ports: ["5432:5432"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    ports: ["9200:9200"]
  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    depends_on: [elasticsearch]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports: ["5601:5601"]

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
  grafana:
    image: grafana/grafana:11.2.0
    depends_on: [prometheus]
    ports: ["3001:3000"]
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro

  deal-service:
    build: ./backend/deal-service
    depends_on: [postgres, kafka]
    environment:
      DEAL_DB_URL: jdbc:postgresql://postgres:5432/escrow
      DEAL_DB_USER: escrow
      DEAL_DB_PASSWORD: escrow
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports: ["8081:8081"]

  escrow-account-service:
    build: ./backend/escrow-account-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports: ["8082:8082"]
  funding-service:
    build: ./backend/funding-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports: ["8083:8083"]
  fulfillment-service:
    build: ./backend/fulfillment-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports: ["8084:8084"]
  review-service:
    build: ./backend/review-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports: ["8085:8085"]
  resolution-service:
    build: ./backend/resolution-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports: ["8086:8086"]
  dispute-service:
    build: ./backend/dispute-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports: ["8087:8087"]
  document-service:
    build: ./backend/document-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports: ["8088:8088"]
  notification-service:
    build: ./backend/notification-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports: ["8089:8089"]
  audit-service:
    build: ./backend/audit-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports: ["8090:8090"]
  auth-service:
    build: ./backend/auth-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports: ["8091:8091"]

  frontend:
    build: ./frontend
    depends_on: [deal-service]
    ports: ["3000:3000"]
