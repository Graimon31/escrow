global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['auth-service:8080']

  - job_name: deal-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['deal-service:8080']

  - job_name: escrow-account-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['escrow-account-service:8080']

  - job_name: funding-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['funding-service:8080']

  - job_name: fulfillment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['fulfillment-service:8080']

  - job_name: review-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['review-service:8080']

  - job_name: dispute-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['dispute-service:8080']

  - job_name: resolution-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['resolution-service:8080']
