server:
  port: 8082

spring:
  application:
    name: deal-service
  datasource:
    url: jdbc:postgresql://localhost:5432/escrow?currentSchema=deals
    username: escrow
    password: escrow
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: deals
    open-in-view: false
  flyway:
    schemas: deals
    default-schema: deals

management:
  endpoints:
    web:
      exposure:
        include: health,info
