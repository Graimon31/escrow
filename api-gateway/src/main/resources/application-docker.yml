spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: deal-service
          uri: http://deal-service:8082
          predicates:
            - Path=/api/deals/**
          filters:
            - JwtAuth

        - id: payment-service
          uri: http://payment-service:8083
          predicates:
            - Path=/api/payments/**
          filters:
            - JwtAuth

        - id: notification-service
          uri: http://notification-service:8084
          predicates:
            - Path=/api/notifications/**
          filters:
            - JwtAuth

        - id: admin-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/admin/**
          filters:
            - JwtAuth

        - id: operator-service
          uri: http://deal-service:8082
          predicates:
            - Path=/api/operator/**
          filters:
            - JwtAuth

        - id: audit-service
          uri: http://audit-service:8085
          predicates:
            - Path=/api/audit/**
          filters:
            - JwtAuth

        - id: document-service
          uri: http://document-service:8086
          predicates:
            - Path=/api/documents/**
          filters:
            - JwtAuth
