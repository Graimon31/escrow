server:
  port: 0

spring:
  application:
    name: deal-service
  datasource:
    url: ${APP_DEAL_DB_URL:jdbc:postgresql://postgres:5432/escrow}
    username: ${APP_DEAL_DB_USER:escrow}
    password: ${APP_DEAL_DB_PASSWORD:escrow}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.escrow.deal_service.event.FundingEvent
        spring.json.trusted.packages: com.escrow.deal_service.event

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  kafka:
    funding-topic: ${APP_KAFKA_FUNDING_TOPIC:escrow.funding.events}
  security:
    jwt-secret: ${APP_AUTH_JWT_SECRET:change-me-in-env-very-secret-key-1234567890}
  clients:
    escrow-account-service-url: ${APP_ESCROW_ACCOUNT_SERVICE_URL:http://escrow-account-service:8080}
