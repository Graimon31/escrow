server:
  port: 0

spring:
  application:
    name: escrow-account-service
  datasource:
    url: ${APP_ESCROW_DB_URL:jdbc:postgresql://postgres:5432/escrow}
    username: ${APP_ESCROW_DB_USER:escrow}
    password: ${APP_ESCROW_DB_PASSWORD:escrow}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt-secret: ${APP_AUTH_JWT_SECRET:change-me-in-env-very-secret-key-1234567890}
