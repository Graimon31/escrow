server:
  port: 8081
spring:
  application:
    name: deal-service
  datasource:
    url: ${DEAL_DB_URL:jdbc:h2:mem:escrow;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${DEAL_DB_USER:sa}
    password: ${DEAL_DB_PASSWORD:}
    driver-class-name: ${DEAL_DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: ${DEAL_FLYWAY_ENABLED:true}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
springdoc:
  swagger-ui:
    path: /swagger-ui.html
